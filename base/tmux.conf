# drydock-base default tmux.conf — system-wide.
#
# Optimized for SSH'd-in interactive sessions where paste from the
# host clipboard must Just Work (claude /login auth codes, GitHub
# device codes, log snippets). All settings are conservative; users
# can extend with ~/.tmux.conf which is sourced after this file.

# Faster Esc response — default 500ms ate the start of Vim and other
# raw-mode UIs (Claude Code Ink TUI especially).
set -s escape-time 10

# Mouse: scroll, click-to-focus pane, drag-select for copy. Selecting
# with mouse and releasing copies into tmux's buffer; with set-clipboard
# on (below) the selection also reaches the host clipboard via OSC 52.
set -g mouse on

# OSC 52 — tmux's clipboard buffer → host terminal emulator's system
# clipboard via escape sequence. Means: select text in tmux, paste it
# in a different host app (browser, Notion, Telegram).
# Supported by iTerm2, Terminal.app, Alacritty, kitty, Windows
# Terminal, Ghostty. Some terminals require explicit opt-in (e.g.
# iTerm2 → Preferences → General → Selection: Applications in terminal
# may access clipboard).
set -g set-clipboard on

# History: default 2000 lines truncated build logs. Bumped to 50k.
set -g history-limit 50000

# Window/pane numbering from 1 (keyboard ergonomics: 1-9 keys live
# above QWERTY, 0 is far away).
set -g base-index 1
setw -g pane-base-index 1

# Copy mode: vi keys. v to start selection, y to copy, Esc to cancel.
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Reload this file without restarting tmux: prefix + R
bind R source-file /etc/tmux.conf \; display-message "tmux config reloaded"
