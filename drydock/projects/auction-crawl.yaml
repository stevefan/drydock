# Drydock project config: auction-crawl workspace.
#
# Consumed by `ws create auction-crawl` (host-side).
#
# Role: high-isolation sandbox for Playwright-driven browser automation
# hitting ~9 public auction sites. Pulls untrusted HTML; a compromised
# listing must not be able to reach anything outside the whitelist.
#
# Firewall posture: narrow. Only the specific auction hosts the crawler
# legitimately visits, plus what's needed to run (pip install, Playwright
# browser download, Anthropic classifier).

# NOTE: auction-crawl lives at microfoundry/auction-crawl/ — inside the
# microfoundry git repo, not its own. Drydock v1's worktree.py currently
# requires repo_path to contain .git directly, which this path does not.
# Options:
#   (a) Run from the monorepo root and rely on a per-sub-project devcontainer
#       at microfoundry/auction-crawl/.devcontainer/ (not yet built).
#   (b) Change repo_path to the monorepo root but set a future
#       workspace_subdir field (not yet in the schema) to mount only
#       auction-crawl/ into the container.
# Leaving repo_path pointed at the sub-project for now as the intent; see
# friction notes. If v1 rejects this at worktree-creation time, switch to
# microfoundry root until a sub-directory workspace field exists.
repo_path: /Users/stevenfan/Unified Workspaces/microfoundry/auction-crawl

tailscale_hostname: auction-crawl
tailscale_serve_port: 3000
tailscale_authkey_env_var: TAILSCALE_AUTHKEY

remote_control_name: auction-crawl

firewall_extra_domains:
  # Python package install (pip install -e . inside the workspace)
  - pypi.org
  - files.pythonhosted.org

  # Playwright browser downloads (CDN routes)
  # Playwright downloads from Microsoft's CDN on recent versions; older
  # versions hit playwright-local.azureedge.net. Include both.
  - playwright.azureedge.net
  - cdn.playwright.dev

  # Auction sites — the only third-party hosts this workspace should reach.
  # Primary domains only; subdomains (e.g. www., api.) resolve to the same
  # IPs in most cases. Expand if crawl breakages surface new subdomains.
  - ebay.com
  - www.ebay.com
  - govdeals.com
  - www.govdeals.com
  - publicsurplus.com
  - www.publicsurplus.com
  - labx.com
  - www.labx.com
  - gsaauctions.gov
  - www.gsaauctions.gov
  - surplus.ucsd.edu
  - swapauction.wisc.edu
  - pittsurplus.com
  - www.pittsurplus.com
  - k-bid.com
  - www.k-bid.com

# Secrets — scoped narrowly. Only ANTHROPIC_API_KEY is needed (for the
# Haiku-driven classifier). NO eBay developer keys, no Fluigent vendor
# creds — this workspace does not need them. Populate
# ~/.drydock/secrets/ws_auction-crawl_auction-crawl/anthropic_api_key
# (one file per secret, Docker-secret convention).
