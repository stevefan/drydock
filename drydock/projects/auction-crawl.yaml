# Drydock project config: auction-crawl workspace.
#
# Consumed by `ws create auction-crawl` (host-side).
#
# Role: high-isolation sandbox for Playwright-driven browser automation
# hitting ~9 public auction sites. Pulls untrusted HTML; a compromised
# listing must not be able to reach anything outside the whitelist.
#
# Firewall posture: narrow. Only the specific auction hosts the crawler
# legitimately visits, plus pip install for its Python deps.
# Playwright browsers are BAKED INTO THE IMAGE (see auction-crawl/
# .devcontainer/Dockerfile) so the CDN hosts are NOT in the run-time
# allowlist — they'd only be needed for a build that pulls browsers,
# and that happens at docker-build time before the firewall is up.

# Monorepo sub-project layout. Git worktree is the full microfoundry
# repo; devcontainer up scopes to auction-crawl/ via workspace_subdir.
repo_path: /Users/stevenfan/Unified Workspaces/microfoundry
workspace_subdir: auction-crawl

tailscale_hostname: auction-crawl
tailscale_serve_port: 3000
tailscale_authkey_env_var: TAILSCALE_AUTHKEY

remote_control_name: auction-crawl

firewall_extra_domains:
  # Python package install
  - pypi.org
  - files.pythonhosted.org

  # Auction sites — the only third-party hosts this workspace should reach.
  - ebay.com
  - www.ebay.com
  - govdeals.com
  - www.govdeals.com
  - publicsurplus.com
  - www.publicsurplus.com
  - m.publicsurplus.com
  - labx.com
  - www.labx.com
  - gsaauctions.gov
  - www.gsaauctions.gov
  - surplus.ucsd.edu
  - swapauction.wisc.edu
  - pittsurplus.com
  - www.pittsurplus.com
  - k-bid.com
  - www.k-bid.com

# Secrets: drydock's default path ~/.drydock/secrets/ws_auction-crawl_auction-crawl/.
# Populate with:
#   echo -n "$ANTHROPIC_API_KEY" > ~/.drydock/secrets/ws_auction-crawl_auction-crawl/anthropic_api_key
# Inside container: $(cat /run/secrets/anthropic_api_key)
# Only ANTHROPIC_API_KEY needed — no vendor API keys, no eBay developer creds.
