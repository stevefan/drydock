# Drydock project config: 3duf workspace.
#
# Consumed by `ws create 3duf` (host-side).
#
# Role: medium-isolation sandbox for the 3DuF visual microfluidics design
# platform (browserify-based Node web app, subtree from CIDARLAB/3DuF).
# Loads user designs and third-party libraries; keep the blast radius
# smaller than the monorepo root but wider than auction-crawl.
#
# Firewall posture: medium. npm + GitHub (base allowlist) plus a small
# set of extras for dev tooling and any APIs the demo calls.

# Same git-worktree friction as auction-crawl: 3duf is a subdirectory of
# the microfoundry monorepo, not its own git repo. See friction notes.
repo_path: /Users/stevenfan/Unified Workspaces/microfoundry/3duf

tailscale_hostname: 3duf
tailscale_serve_port: 8000  # 3DuF's browserify dev server typical default
tailscale_authkey_env_var: TAILSCALE_AUTHKEY

remote_control_name: 3duf

firewall_extra_domains:
  # GitHub raw / code download (package-lock transitive sources)
  - raw.githubusercontent.com
  - objects.githubusercontent.com
  - codeload.github.com
  # Font and CDN assets commonly referenced by Handsontable / nouislider /
  # other UI dependencies. Add as needed; start minimal.
  - fonts.googleapis.com
  - fonts.gstatic.com

# Secrets — 3duf doesn't need Anthropic by default. Leave the secrets
# directory (~/.drydock/secrets/ws_3duf_3duf/) empty unless something
# requires an API key.
