# Port Auditor — the role-locked drydock that watches this Harbor.
#
# One per Harbor. Designated via `drydock auditor designate <name>`,
# which runs core/auditor/role_validator.py against this YAML before
# granting the auditor token scope.
#
# Constraints (enforced by the validator, not advisory):
#   - role: auditor                — required
#   - narrow egress                — only Anthropic + Telegram
#   - no broker capabilities       — Auditor uses direct scope
#   - no delegation                — Auditor doesn't sublease
#   - bounded resources            — small watch loop, not a workload
#   - approved image               — drydock-base for now
#   - no storage mounts, extra mounts, or forwarded ports
#
# What the Auditor needs that's NOT yet baked into project YAML:
#   - audit-log read-only bind-mount
#   - daemon-socket bind-mount
#   - bearer token scope = auditor (set by `drydock auditor designate`)
# These are added by the daemon at create time once we wire the
# role-aware overlay path. For now, designation flips the scope; the
# bind-mounts come in the next deliberate piece.
#
# Loosening any of the validator's constraints requires editing
# core/auditor/role_validator.py — a deliberate principal-side action,
# not a YAML knob.

role: auditor

repo_path: /root/src/port-auditor
devcontainer_subpath: .devcontainer/drydock
tailscale_hostname: port-auditor
remote_control_name: port-auditor

firewall_extra_domains:
  - api.anthropic.com
  - api.telegram.org

resources_hard:
  cpus: 1.0
  memory: 1g
  pids: 256

deskwatch:
  probes:
    - name: watch-loop-alive
      cmd: "test -f /root/.drydock/auditor/heartbeat && find /root/.drydock/auditor/heartbeat -mmin -10 | grep -q ."
      interval: 5m
